[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv
monitor_speed = 115200
extra_scripts = pre:scripts/gzip_html.py
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    links2004/WebSockets@^2.4.0
    ricmoo/QRCode@^0.0.1
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17
    -DTFT_BL=4
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000

[env:esp32-headless]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv
monitor_speed = 115200
extra_scripts = pre:scripts/gzip_html.py
lib_deps =
    links2004/WebSockets@^2.4.0
build_flags =
    -DHEADLESS_BUILD=1
src_filter =
    +<*>
    -<ui.cpp>
    -<transitions.cpp>
    -<splash.cpp>
    -<screens.cpp>
    -<palate_training.cpp>
    -<screen_*.cpp>
    -<browse.cpp>
